name: Mac and Windows Portable Build

on:
  push:
    branches: [master, "codex/**"]
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PACKAGE_PREFIX: "deskflow"
  CMAKE_CONFIGURE: "cmake -Bbuild -DCMAKE_BUILD_TYPE=Release -DSKIP_BUILD_TESTS=ON -DCMAKE_COMPILE_WARNING_AS_ERROR=ON"

jobs:
  build-macos-arm64:
    name: macos-arm64
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          qt-version: 6.10.1

      - name: Get version
        uses: ./.github/actions/get-version

      - name: Configure
        shell: bash
        run: >
          ${{ env.CMAKE_CONFIGURE }}
          -DCMAKE_OSX_ARCHITECTURES="arm64"
          -DCMAKE_OSX_DEPLOYMENT_TARGET=14
          -DCMAKE_OSX_SYSROOT=/Applications/Xcode_16.4.app/Contents/Developer/Platforms/MacOSX.platform/Developer/SDKs/MacOSX.sdk
          -DPACKAGE_VERSION_LABEL="${{ env.DESKFLOW_PACKAGE_VERSION }}"

      - name: Build
        shell: bash
        run: cmake --build build --config Release -j8 --target package

      - name: Test package
        uses: ./.github/actions/test-package

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ env.PACKAGE_PREFIX }}-macos-arm64
          path: ${{ github.workspace }}/build/deskflow-*.dmg

  build-windows-portable:
    name: windows-x64-portable
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup VC++ environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install dependencies
        id: get-deps
        uses: ./.github/actions/install-dependencies
        with:
          qt-version: 6.10.1
          vcpkg-triplet: x64-windows-release

      - name: Get version
        uses: ./.github/actions/get-version

      - name: Configure
        run: >
          ${{ env.CMAKE_CONFIGURE }}
          -G Ninja
          ${{ steps.get-deps.outputs.vcpkg-cmake-config }}
          -DPACKAGE_VERSION_LABEL="${{ env.DESKFLOW_PACKAGE_VERSION }}"

      - name: Build
        run: cmake --build build --config Release -j8 --target package

      - name: Test package
        uses: ./.github/actions/test-package

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ env.PACKAGE_PREFIX }}-windows-x64-portable
          path: ${{ github.workspace }}/build/deskflow-*-portable.7z
